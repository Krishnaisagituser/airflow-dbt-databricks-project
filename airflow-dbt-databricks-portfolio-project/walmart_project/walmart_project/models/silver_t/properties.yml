version: 2

models:
  - name: products_t
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique:
              config:
                where: "price > 0"  # This works perfectly in dbt v1.7+

  - name: orders_t
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique